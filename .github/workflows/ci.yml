name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unit tests
        run: python -m unittest discover -s structured-review/tests

      - name: Compile
        run: python -m compileall -q structured-review
