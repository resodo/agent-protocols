name: Dispatch Skynet Data Protocol Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  dispatch:
    name: dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Skynet Data update
        env:
          GH_TOKEN: ${{ secrets.SKYNET_DATA_DISPATCH_TOKEN }}
          SKYNET_DATA_REPO: MAGI-Systems-01/skynet-data
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "SKYNET_DATA_DISPATCH_TOKEN is not configured."
            exit 1
          fi

          cat > /tmp/repository-dispatch.json <<EOF
          {
            "event_type": "agent-protocols-updated",
            "client_payload": {
              "repository": "${SOURCE_REPOSITORY}",
              "sha": "${SOURCE_SHA}"
            }
          }
          EOF

          gh api \
            --method POST \
            "repos/${SKYNET_DATA_REPO}/dispatches" \
            --input /tmp/repository-dispatch.json
