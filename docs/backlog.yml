version: 1
repo: resodo/agent-protocols
id_prefix: AP-BL
kinds:
  - bug
  - feature
  - ops
  - debt
  - research
  - process
items:
  - id: AP-BL-0001
    status: open
    priority: P1
    kind: process
    title: Define protocol self-evolution workflow
    why: >
      Review misses and process lessons need a consistent path from observed
      friction to durable protocol changes without bloating SKILL.md files.
    next: >
      Define when a missed review gap should be recorded, who records it, where
      it lives, and when a lesson stays in a log versus being promoted into
      SKILL.md or a required reference.
    done_when: >
      The shared protocols describe a self-evolution workflow with clear owner,
      storage location, promotion criteria, and closeout expectations.

  - id: AP-BL-0002
    status: closed
    priority: P1
    kind: process
    title: Decide the global canonical source for structured review
    resolution: completed
    closed_at: 2026-06-10
    outcome: >
      The canonical source is this repo's origin/main. The only documented
      consumption path is the pinned external/agent-protocols submodule plus
      the worktree guard, which checks freshness mechanically: fetch-first
      worktree creation based on the fresh default branch, with a loud stop
      when the fetch fails. No machine-global read path exists; the stale
      user-home clone was deleted, and ad-hoc non-submodule use is
      human-directed in session.
    refs:
      - docs/agent_plans/2026-06-10_canonical_protocol_source_plan.md

  - id: AP-BL-0003
    status: closed
    priority: P2
    kind: process
    title: Design agent-specific protocol wrappers
    resolution: completed
    closed_at: 2026-06-10
    outcome: >
      The agent-specific wrapper is the native skill mount: consuming repos
      commit symlinks (.claude/skills/<protocol> for Claude Code,
      .agents/skills/<protocol> for Codex) into the pinned submodule, so a
      fresh submodule makes the protocols load through each agent's
      documented project-level skill discovery at startup. No pointer files
      and no duplicated protocol content; spikes verified symlinked skill
      cataloging in both agents on their documented paths.
    refs:
      - docs/agent_plans/2026-06-10_canonical_protocol_source_plan.md

  - id: AP-BL-0004
    status: open
    priority: P2
    kind: process
    title: Dogfood structured review on real artifacts
    why: >
      Real plan and implementation reviews reveal friction that synthetic
      examples miss, but those observations should not turn public protocol
      files into project-specific incident logs.
    next: >
      Continue running structured-review on real artifacts and record recurring
      friction points in the appropriate backlog or plan before promoting stable
      lessons into protocol text.
    done_when: >
      Repeated real-artifact review friction has been either resolved in the
      protocol, recorded as open backlog work, or intentionally left out with a
      documented reason.

  - id: AP-BL-0005
    status: open
    priority: P2
    kind: debt
    title: Add optional examples or evolution logs only if usage proves need
    why: >
      Required structured-review lenses now live in references loaded by the
      Claude runner; optional examples or evolution logs may help later, but
      adding them too early risks duplicating the checklist and bloating context.
    next: >
      Watch v1 usage for repeated cases where examples, evolution logs, or
      unusual review-case notes would materially improve review quality without
      duplicating references/review-lenses.md.
    done_when: >
      Optional reference files are added only for proven recurring needs, or the
      backlog item is closed because the current required references remain
      sufficient.
    refs:
      - structured-review/references/review-lenses.md
